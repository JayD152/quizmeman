services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizme
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizme_secret}
      POSTGRES_DB: quizme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizme"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${GITHUB_REPO:-your-username/quizmeman}/quizme:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://quizme:${POSTGRES_PASSWORD:-quizme_secret}@db:5432/quizme
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
